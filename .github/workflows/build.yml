name: build-master

on:
  push:
    branches: [ "master", "actions-test" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  SOLUTION_PATH: .
  CONFIGURATION: Release
  PLATFORM: x86

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Set up environment
      run: |
        mkdir .\acp
        mkdir .\acp\bin
        echo "acplib=$(Resolve-Path .\acp\bin)" >> $env:GITHUB_ENV

    # - name: Get latest ACP_Ray2 artifact
    #   uses: dawidd6/action-download-artifact@v6
    #   with:
    #     repo: raytools/ACP_Ray2
    #     workflow: build.yml
    #     name: ACP_Ray2-master
    #     path: acp/

    - name: Checkout ACP_Ray2
      uses: actions/checkout@v6
      with:
        repository: raytools/ACP_Ray2
        path: acp/

    - name: Build ACP_Ray2
      working-directory: ${{env.GITHUB_WORKSPACE}}/acp
      run: msbuild /m /p:Configuration=${{env.CONFIGURATION}} /p:Platform=${{env.PLATFORM}} .

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: msbuild /m /p:Configuration=${{env.CONFIGURATION}} /p:Platform=${{env.PLATFORM}} ${{env.SOLUTION_PATH}}

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Ray2Fix-devel
        path: Release/
        if-no-files-found: error
